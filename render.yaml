services:
  - type: web
    name: voiceiq
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: sh backend/start.sh
    envVars:
      - key: HF_API_TOKEN
        sync: false          # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.12.0"
