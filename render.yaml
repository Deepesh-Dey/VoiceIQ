services:
  - type: web
    name: voiceiq
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-10000}
    envVars:
      - key: HF_API_TOKEN
        sync: false          # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.12.0"
